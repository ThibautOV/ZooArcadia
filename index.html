<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoo Arcadia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="Asset/CSS/style.css">
  </head>

  <body>
    <header>
      <nav class="navbar navbar-expand-lg" navbar>
        <div class="container-fluid">
          <div class="logo">
            <img src="Asset/Image/Logo-arcadia.png" alt="Logo Arcadia">
          </div>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link" href="#">Accueil</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Nos Services</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Nos résidents</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Les habitats</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Connexion</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <section class="py-4 py-xl-5">
        <!-- presentation du zoo -->
        <div class="container">
          <div class="presentation-img">
            <div class="row g-0">
              <div class="col-md-6">
                <div class="p-4 p-md-5" presentation-txt>
                  <h2>Bienvenue au ZOO ARCADIA</h2>
                  <p class="mb-4">Arcadia est un zoo situé en France près de la forêt de Brocéliande, en bretagne depuis
                    1960. </p>
                  <div class="my-3"></div>
                </div>
              </div>
              <div class="col-md-6 order-first order-md-last" style="min-height: 250px;"><img
                  class="w-100 h-100 fit-cover" src="Asset/Image/zoopresentation-img.jpg" /></div>
            </div>
          </div>
        </div>
      </section>
      <section id="carousel1">
        <!--1st Carousel-->
        <h1>Le coin du MARAIS</h1>
        <div class="carousel slide" data-bs-ride="carousel">
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img src="Asset/Image/marais-img.jpg"" alt=" marais-img">
            </div>
            <div class="carousel-item">
              <img src="Asset/Image/hippo-img.jpg" alt="hippo-img">
            </div>
            <div class="carousel-item">
              <img src="Asset/Image/heron-img.jpg" alt="heron-img">
            </div>
          </div>
        </div>
    </main>
    <script src="Asset/JS/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"></script>
</body>

</html>
